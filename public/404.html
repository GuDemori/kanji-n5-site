<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecionando...</title>
  </head>
  <body>
    <script>
      (function () {
        var path = window.location.pathname;
        var knownRoutes = ['/counting', '/te-form'];
        var normalized = path.endsWith('/') ? path.slice(0, -1) : path;
        var knownRoute = knownRoutes.find(function (route) {
          return normalized === route || normalized.endsWith(route);
        });

        if (!knownRoute) {
          window.location.replace('/');
          return;
        }

        var routeIndex = normalized.lastIndexOf(knownRoute);
        var basePath = normalized.slice(0, routeIndex);
        var origin = window.location.origin;
        var baseUrl = basePath ? basePath + '/' : '/';
        var destination = origin + baseUrl + '?p=' + encodeURIComponent(knownRoute);

        window.location.replace(destination);
      })();
    </script>
  </body>
</html>
